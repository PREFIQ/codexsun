name: codexsun-sites

x-site: &site
  image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/sites-stack-web:${SITES_STACK_WEB_IMAGE_TAG:-1.0.37}
  restart: unless-stopped
  networks: [codexsun-network]

services:
  codexsun-site:
    <<: *site
    build:
      context: ../..
      dockerfile: .container/sites/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
    container_name: codexsun-site-codexsun-com
    environment: { CODEXSUN_SITE_CLIENT: codexsun }
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${CODEXSUN_SITE_HOST_PORT:-7170}:80"

  logicx-site:
    <<: *site
    container_name: codexsun-site-logicx-in
    environment: { CODEXSUN_SITE_CLIENT: logicx }
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${LOGICX_SITE_HOST_PORT:-7180}:80"

  techmedia-site:
    <<: *site
    container_name: codexsun-site-techmedia-in
    environment: { CODEXSUN_SITE_CLIENT: techmedia }
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${TECHMEDIA_SITE_HOST_PORT:-7190}:80"

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
