name: codexsun-b2bconnect

x-api-env: &api-env
  NODE_ENV: production
  API_HOST: 0.0.0.0
  PLATFORM_API_PORT: 7010
  CORE_API_PORT: 7030
  BILLING_API_PORT: 7050
  B2BCONNECT_API_PORT: 7135
  CODEXSUN_ALLOW_MISSING_ENV: "1"
  AUTH_MODE: ${AUTH_MODE:-jwt}
  DB_DRIVER: mariadb
  DB_HOST: ${DB_HOST:-codexsun-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-root}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_MASTER_NAME: ${B2BCONNECT_DB_MASTER_NAME:-cxsun_b2bconnect_master}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  PLATFORM_WEB_ORIGIN: ${B2BCONNECT_WEB_ORIGIN:-http://localhost:7140}
  CORE_WEB_ORIGIN: ${B2BCONNECT_WEB_ORIGIN:-http://localhost:7140}
  BILLING_WEB_ORIGIN: ${B2BCONNECT_WEB_ORIGIN:-http://localhost:7140}
  B2BCONNECT_WEB_ORIGIN: ${B2BCONNECT_WEB_ORIGIN:-http://localhost:7140}
  PLATFORM_API_URL: http://b2bconnect-platform-api:7010
  CORE_API_URL: http://b2bconnect-core-api:7030
  CODEXSUN_QUEUE_BACKEND: ${CODEXSUN_QUEUE_BACKEND:-bullmq-redis}
  CODEXSUN_REDIS_URL: ${CODEXSUN_REDIS_URL:?CODEXSUN_REDIS_URL is required}
  CODEXSUN_QUEUE_WORKER_ENABLED: ${CODEXSUN_QUEUE_WORKER_ENABLED:-1}
  CODEXSUN_DB_FRESH_ON_START: ${CODEXSUN_DB_FRESH_ON_START:-0}
  CODEXSUN_ALLOW_PRODUCTION_DB_RESET: ${CODEXSUN_ALLOW_PRODUCTION_DB_RESET:-0}
  CODEXSUN_VERIFIED_BACKUP_ID: ${CODEXSUN_VERIFIED_BACKUP_ID:-}
  CODEXSUN_BACKUP_DIR: /storage/backups/database
  STORAGE_ROOT: /storage/app
  STORAGE_PUBLIC_ROOT: /storage/public
  ENABLE_DEFAULT_TENANT_SEED: ${ENABLE_DEFAULT_TENANT_SEED:-0}
  DEFAULT_TENANT_CORPORATE_ID: ${DEFAULT_TENANT_CORPORATE_ID:-}
  DEFAULT_TENANT_DB_NAME: ${DEFAULT_TENANT_DB_NAME:-}
  DEFAULT_TENANT_DOMAIN: ${DEFAULT_TENANT_DOMAIN:-localhost}
  DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-}
  DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-}
  DEFAULT_TENANT_ADMIN_NAME: ${DEFAULT_TENANT_ADMIN_NAME:-}
  DEFAULT_TENANT_ADMIN_EMAIL: ${DEFAULT_TENANT_ADMIN_EMAIL:-}
  DEFAULT_TENANT_ADMIN_PASSWORD: ${DEFAULT_TENANT_ADMIN_PASSWORD:-}
  TENANT_DOMAIN_BASE: ${TENANT_DOMAIN_BASE:-localhost}
  SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
  SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
  SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
  SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}

x-api-service: &api-service
  image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/b2bconnect-stack-api:${B2BCONNECT_STACK_API_IMAGE_TAG:-1.0.37}
  restart: unless-stopped
  volumes:
    - b2bconnect-stack-data:/storage
    - media-data:/storage/media
  networks: [codexsun-network]

services:
  b2bconnect-storage-init:
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/b2bconnect-stack-api:${B2BCONNECT_STACK_API_IMAGE_TAG:-1.0.37}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /storage/app /storage/public /storage/tenants /storage/backups/database
        chown -R 1000:1000 /storage/app /storage/public /storage/tenants /storage/backups
    volumes:
      - b2bconnect-stack-data:/storage
      - media-data:/storage/media
    networks: [codexsun-network]
    healthcheck: { disable: true }
    restart: "no"

  b2bconnect-platform-api:
    <<: *api-service
    build:
      context: ../..
      dockerfile: .container/b2bconnect/Dockerfile.api
      target: runtime
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
    container_name: codexsun-b2bconnect-platform-api
    depends_on:
      b2bconnect-storage-init: { condition: service_completed_successfully }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: platform-api
      HEALTH_PORT: 7010
      PLATFORM_API_PORT: 7010
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${B2BCONNECT_PLATFORM_API_HOST_PORT:-7210}:7010"

  b2bconnect-core-api:
    <<: *api-service
    container_name: codexsun-b2bconnect-core-api
    depends_on:
      b2bconnect-platform-api: { condition: service_healthy }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: core-api
      HEALTH_PORT: 7030
      CORE_API_PORT: 7030
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${B2BCONNECT_CORE_API_HOST_PORT:-7230}:7030"

  b2bconnect-api:
    <<: *api-service
    container_name: codexsun-b2bconnect-api
    depends_on:
      b2bconnect-core-api: { condition: service_healthy }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: b2bconnect-api
      HEALTH_PORT: 7135
      B2BCONNECT_API_PORT: 7135
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${B2BCONNECT_API_HOST_PORT:-7135}:7135"

  b2bconnect-web:
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/b2bconnect-stack-web:${B2BCONNECT_STACK_WEB_IMAGE_TAG:-1.0.37}
    build:
      context: ../..
      dockerfile: .container/b2bconnect/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
        VITE_PLATFORM_API_URL: ${B2BCONNECT_VITE_PLATFORM_API_URL:-http://localhost:7210}
        VITE_B2BCONNECT_API_URL: ${VITE_B2BCONNECT_API_URL:-http://localhost:7135}
    container_name: codexsun-b2bconnect-web
    restart: unless-stopped
    environment: { CODEXSUN_WEB_APP: b2bconnect }
    depends_on:
      b2bconnect-api: { condition: service_healthy }
    networks: [codexsun-network]
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${B2BCONNECT_WEB_HOST_PORT:-7140}:80"

  b2bconnect-migrate:
    build:
      context: ../..
      dockerfile: .container/b2bconnect/Dockerfile.api
      target: migrations
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/b2bconnect-stack-migrations:${B2BCONNECT_STACK_MIGRATIONS_IMAGE_TAG:-1.0.37}
    profiles: [tools]
    environment:
      <<: *api-env
      PLATFORM_API_PORT: 7010
      CORE_API_PORT: 7030
      BILLING_API_PORT: 7050
      B2BCONNECT_API_PORT: 7135
    volumes:
      - b2bconnect-stack-data:/storage
      - media-data:/storage/media
    networks: [codexsun-network]

volumes:
  b2bconnect-stack-data:
    name: ${B2BCONNECT_STACK_DATA_VOLUME:-codexsun-b2bconnect-stack-data}
  media-data:
    name: ${MEDIA_DATA_VOLUME:-codexsun-media-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
