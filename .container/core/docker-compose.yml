services:
  core-api:
    build:
      context: ../..
      dockerfile: .container/core/Dockerfile.api
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/core-api:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-core-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CORE_API_HOST: 0.0.0.0
      CORE_API_PORT: 7030
      CORE_WEB_ORIGIN: ${CORE_WEB_ORIGIN:-http://localhost:7040}
      PLATFORM_WEB_ORIGIN: ${PLATFORM_WEB_ORIGIN:-http://localhost:7020}
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://codexsun-platform-api:7010}
      DB_HOST: ${DB_HOST:-codexsun-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-codexsun}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_MASTER_NAME: ${DB_MASTER_NAME:-codexsun_master}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${CORE_API_HOST_PORT:-7030}:7030"
    volumes:
      - core-data:/storage
      - pictures-data:/storage/pictures
      - files-data:/storage/files
    networks:
      - codexsun-network

  core-web:
    build:
      context: ../..
      dockerfile: .container/core/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
        VITE_PLATFORM_API_URL: ${VITE_PLATFORM_API_URL:-http://localhost:7010}
        VITE_CORE_API_URL: ${VITE_CORE_API_URL:-http://localhost:7030}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/core-web:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-core-web
    restart: unless-stopped
    depends_on:
      core-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${CORE_WEB_HOST_PORT:-7040}:80"
    networks:
      - codexsun-network

volumes:
  core-data:
    name: ${CORE_DATA_VOLUME:-codexsun-core-data}
  pictures-data:
    name: ${PICTURES_DATA_VOLUME:-codexsun-pictures-data}
    external: true
  files-data:
    name: ${FILES_DATA_VOLUME:-codexsun-files-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
