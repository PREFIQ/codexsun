name: codexsun-ecommerce

x-api-env: &api-env
  NODE_ENV: production
  API_HOST: 0.0.0.0
  PLATFORM_API_PORT: 7010
  CORE_API_PORT: 7030
  BILLING_API_PORT: 7050
  ECOMMERCE_API_PORT: 7150
  CODEXSUN_ALLOW_MISSING_ENV: "1"
  AUTH_MODE: ${AUTH_MODE:-jwt}
  DB_DRIVER: mariadb
  DB_HOST: ${DB_HOST:-codexsun-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-root}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_MASTER_NAME: ${ECOMMERCE_DB_MASTER_NAME:-cxsun_ecommerce_master}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  PLATFORM_WEB_ORIGIN: ${ECOMMERCE_WEB_ORIGIN:-http://localhost:7160}
  CORE_WEB_ORIGIN: ${ECOMMERCE_WEB_ORIGIN:-http://localhost:7160}
  BILLING_WEB_ORIGIN: ${ECOMMERCE_WEB_ORIGIN:-http://localhost:7160}
  ECOMMERCE_WEB_ORIGIN: ${ECOMMERCE_WEB_ORIGIN:-http://localhost:7160}
  PLATFORM_API_URL: http://ecommerce-platform-api:7010
  CORE_API_URL: http://ecommerce-core-api:7030
  CODEXSUN_QUEUE_BACKEND: ${CODEXSUN_QUEUE_BACKEND:-bullmq-redis}
  CODEXSUN_REDIS_URL: ${CODEXSUN_REDIS_URL:?CODEXSUN_REDIS_URL is required}
  CODEXSUN_QUEUE_WORKER_ENABLED: ${CODEXSUN_QUEUE_WORKER_ENABLED:-1}
  CODEXSUN_DB_FRESH_ON_START: ${CODEXSUN_DB_FRESH_ON_START:-0}
  CODEXSUN_ALLOW_PRODUCTION_DB_RESET: ${CODEXSUN_ALLOW_PRODUCTION_DB_RESET:-0}
  CODEXSUN_VERIFIED_BACKUP_ID: ${CODEXSUN_VERIFIED_BACKUP_ID:-}
  CODEXSUN_BACKUP_DIR: /storage/backups/database
  STORAGE_ROOT: /storage/app
  STORAGE_PUBLIC_ROOT: /storage/public
  ENABLE_DEFAULT_TENANT_SEED: ${ENABLE_DEFAULT_TENANT_SEED:-0}
  DEFAULT_TENANT_CORPORATE_ID: ${DEFAULT_TENANT_CORPORATE_ID:-}
  DEFAULT_TENANT_DB_NAME: ${DEFAULT_TENANT_DB_NAME:-}
  DEFAULT_TENANT_DOMAIN: ${DEFAULT_TENANT_DOMAIN:-localhost}
  DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-}
  DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-}
  DEFAULT_TENANT_ADMIN_NAME: ${DEFAULT_TENANT_ADMIN_NAME:-}
  DEFAULT_TENANT_ADMIN_EMAIL: ${DEFAULT_TENANT_ADMIN_EMAIL:-}
  DEFAULT_TENANT_ADMIN_PASSWORD: ${DEFAULT_TENANT_ADMIN_PASSWORD:-}
  TENANT_DOMAIN_BASE: ${TENANT_DOMAIN_BASE:-localhost}
  SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
  SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
  SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
  SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}
  GSP_ENVIRONMENT: ${GSP_ENVIRONMENT:-sandbox}
  GSP_EMAIL: ${GSP_EMAIL:-}
  GSP_USERNAME: ${GSP_USERNAME:-}
  GSP_PASSWORD: ${GSP_PASSWORD:-}
  GSP_CLIENT_ID: ${GSP_CLIENT_ID:-}
  GSP_CLIENT_SECRET: ${GSP_CLIENT_SECRET:-}
  GSP_GSTIN: ${GSP_GSTIN:-}
  GSP_IP_ADDRESS: ${GSP_IP_ADDRESS:-0.0.0.0}

x-api-service: &api-service
  image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/ecommerce-stack-api:${ECOMMERCE_STACK_API_IMAGE_TAG:-1.0.37}
  restart: unless-stopped
  volumes:
    - ecommerce-stack-data:/storage
    - media-data:/storage/media
  networks:
    - codexsun-network

services:
  ecommerce-storage-init:
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/ecommerce-stack-api:${ECOMMERCE_STACK_API_IMAGE_TAG:-1.0.37}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /storage/app /storage/public /storage/tenants /storage/backups/database
        chown -R 1000:1000 /storage/app /storage/public /storage/tenants /storage/backups
    volumes:
      - ecommerce-stack-data:/storage
      - media-data:/storage/media
    networks: [codexsun-network]
    healthcheck: { disable: true }
    restart: "no"

  ecommerce-platform-api:
    <<: *api-service
    build:
      context: ../..
      dockerfile: .container/ecommerce/Dockerfile.api
      target: runtime
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
    container_name: codexsun-ecommerce-platform-api
    depends_on:
      ecommerce-storage-init: { condition: service_completed_successfully }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: platform-api
      HEALTH_PORT: 7010
      PLATFORM_API_PORT: 7010
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${ECOMMERCE_PLATFORM_API_HOST_PORT:-7310}:7010"

  ecommerce-core-api:
    <<: *api-service
    container_name: codexsun-ecommerce-core-api
    depends_on:
      ecommerce-platform-api: { condition: service_healthy }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: core-api
      HEALTH_PORT: 7030
      CORE_API_PORT: 7030
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${ECOMMERCE_CORE_API_HOST_PORT:-7330}:7030"

  ecommerce-billing-api:
    <<: *api-service
    container_name: codexsun-ecommerce-billing-api
    depends_on:
      ecommerce-core-api: { condition: service_healthy }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: billing-api
      HEALTH_PORT: 7050
      BILLING_API_PORT: 7050
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${ECOMMERCE_BILLING_API_HOST_PORT:-7350}:7050"

  ecommerce-api:
    <<: *api-service
    container_name: codexsun-ecommerce-api
    depends_on:
      ecommerce-billing-api: { condition: service_healthy }
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: ecommerce-api
      HEALTH_PORT: 7150
      ECOMMERCE_API_PORT: 7150
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${ECOMMERCE_API_HOST_PORT:-7150}:7150"

  ecommerce-web:
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/ecommerce-stack-web:${ECOMMERCE_STACK_WEB_IMAGE_TAG:-1.0.37}
    build:
      context: ../..
      dockerfile: .container/ecommerce/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
        VITE_ECOMMERCE_API_URL: ${VITE_ECOMMERCE_API_URL:-http://localhost:7150}
    container_name: codexsun-ecommerce-web
    restart: unless-stopped
    environment: { CODEXSUN_WEB_APP: ecommerce }
    depends_on:
      ecommerce-api: { condition: service_healthy }
    networks: [codexsun-network]
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${ECOMMERCE_WEB_HOST_PORT:-7160}:80"

  ecommerce-migrate:
    build:
      context: ../..
      dockerfile: .container/ecommerce/Dockerfile.api
      target: migrations
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.37}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/ecommerce-stack-migrations:${ECOMMERCE_STACK_MIGRATIONS_IMAGE_TAG:-1.0.37}
    profiles: [tools]
    environment:
      <<: *api-env
      PLATFORM_API_PORT: 7010
      CORE_API_PORT: 7030
      BILLING_API_PORT: 7050
      ECOMMERCE_API_PORT: 7150
    volumes:
      - ecommerce-stack-data:/storage
      - media-data:/storage/media
    networks: [codexsun-network]

volumes:
  ecommerce-stack-data:
    name: ${ECOMMERCE_STACK_DATA_VOLUME:-codexsun-ecommerce-stack-data}
  media-data:
    name: ${MEDIA_DATA_VOLUME:-codexsun-media-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
