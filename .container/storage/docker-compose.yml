services:
  pictures:
    build:
      context: ../..
      dockerfile: .container/storage/Dockerfile
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
        FILEBROWSER_BASE_IMAGE: ${FILEBROWSER_BASE_IMAGE:-filebrowser/filebrowser:v2.63.5}
        STORAGE_ROLE: pictures
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/pictures:${PICTURES_IMAGE_TAG:-1.0.32-filebrowser2.63.5}
    container_name: codexsun-pictures
    restart: unless-stopped
    user: "0:0"
    command:
      - --address
      - 0.0.0.0
      - --port
      - "80"
      - --root
      - /srv
      - --database
      - /database/filebrowser.db
      - --username
      - ${PICTURES_ADMIN_USER:-admin}
      - --password
      - ${PICTURES_ADMIN_PASSWORD:?PICTURES_ADMIN_PASSWORD is required}
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${PICTURES_HOST_PORT:-7094}:80"
    volumes:
      - pictures-data:/srv
      - pictures-db:/database
    networks:
      - codexsun-network

  files:
    build:
      context: ../..
      dockerfile: .container/storage/Dockerfile
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
        FILEBROWSER_BASE_IMAGE: ${FILEBROWSER_BASE_IMAGE:-filebrowser/filebrowser:v2.63.5}
        STORAGE_ROLE: files
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/files:${FILES_IMAGE_TAG:-1.0.32-filebrowser2.63.5}
    container_name: codexsun-files
    restart: unless-stopped
    user: "0:0"
    command:
      - --address
      - 0.0.0.0
      - --port
      - "80"
      - --root
      - /srv
      - --database
      - /database/filebrowser.db
      - --username
      - ${FILES_ADMIN_USER:-admin}
      - --password
      - ${FILES_ADMIN_PASSWORD:?FILES_ADMIN_PASSWORD is required}
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${FILES_HOST_PORT:-7090}:80"
    volumes:
      - files-data:/srv
      - files-db:/database
    networks:
      - codexsun-network

volumes:
  pictures-data:
    name: ${PICTURES_DATA_VOLUME:-codexsun-pictures-data}
    external: true
  pictures-db:
    name: ${PICTURES_DB_VOLUME:-codexsun-pictures-db}
    external: true
  files-data:
    name: ${FILES_DATA_VOLUME:-codexsun-files-data}
    external: true
  files-db:
    name: ${FILES_DB_VOLUME:-codexsun-files-db}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
