name: codexsun-billing

x-api-env: &api-env
  NODE_ENV: production
  API_HOST: 0.0.0.0
  PLATFORM_API_PORT: 7010
  CORE_API_PORT: 7030
  BILLING_API_PORT: 7050
  CODEXSUN_ALLOW_MISSING_ENV: "1"
  AUTH_MODE: ${AUTH_MODE:-jwt}
  DB_DRIVER: mariadb
  DB_HOST: ${DB_HOST:-codexsun-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-root}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_MASTER_NAME: ${DB_MASTER_NAME:-codexsun_master}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  PLATFORM_WEB_ORIGIN: ${PLATFORM_WEB_ORIGIN:-http://localhost:7020}
  CORE_WEB_ORIGIN: ${CORE_WEB_ORIGIN:-http://localhost:7040}
  BILLING_WEB_ORIGIN: ${BILLING_WEB_ORIGIN:-http://localhost:7060}
  PLATFORM_API_URL: ${PLATFORM_API_URL:-http://codexsun-platform-api:7010}
  CORE_API_URL: ${CORE_API_URL:-http://codexsun-core-api:7030}
  CODEXSUN_QUEUE_BACKEND: ${CODEXSUN_QUEUE_BACKEND:-bullmq-redis}
  CODEXSUN_REDIS_URL: ${CODEXSUN_REDIS_URL:?CODEXSUN_REDIS_URL is required}
  CODEXSUN_QUEUE_WORKER_ENABLED: ${CODEXSUN_QUEUE_WORKER_ENABLED:-1}
  CODEXSUN_DB_FRESH_ON_START: ${CODEXSUN_DB_FRESH_ON_START:-0}
  CODEXSUN_ALLOW_PRODUCTION_DB_RESET: ${CODEXSUN_ALLOW_PRODUCTION_DB_RESET:-0}
  CODEXSUN_VERIFIED_BACKUP_ID: ${CODEXSUN_VERIFIED_BACKUP_ID:-}
  CODEXSUN_BACKUP_DIR: /storage/backups/database
  STORAGE_ROOT: /storage/app
  STORAGE_PUBLIC_ROOT: /storage/public
  ENABLE_DEFAULT_TENANT_SEED: ${ENABLE_DEFAULT_TENANT_SEED:-0}
  DEFAULT_TENANT_CORPORATE_ID: ${DEFAULT_TENANT_CORPORATE_ID:-}
  DEFAULT_TENANT_DB_NAME: ${DEFAULT_TENANT_DB_NAME:-}
  DEFAULT_TENANT_DOMAIN: ${DEFAULT_TENANT_DOMAIN:-localhost}
  DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-}
  DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-}
  DEFAULT_TENANT_ADMIN_NAME: ${DEFAULT_TENANT_ADMIN_NAME:-}
  DEFAULT_TENANT_ADMIN_EMAIL: ${DEFAULT_TENANT_ADMIN_EMAIL:-}
  DEFAULT_TENANT_ADMIN_PASSWORD: ${DEFAULT_TENANT_ADMIN_PASSWORD:-}
  TENANT_DOMAIN_BASE: ${TENANT_DOMAIN_BASE:-localhost}
  SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
  SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
  SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
  SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}
  GSP_ENVIRONMENT: ${GSP_ENVIRONMENT:-sandbox}
  GSP_EMAIL: ${GSP_EMAIL:-}
  GSP_USERNAME: ${GSP_USERNAME:-}
  GSP_PASSWORD: ${GSP_PASSWORD:-}
  GSP_CLIENT_ID: ${GSP_CLIENT_ID:-}
  GSP_CLIENT_SECRET: ${GSP_CLIENT_SECRET:-}
  GSP_GSTIN: ${GSP_GSTIN:-}
  GSP_IP_ADDRESS: ${GSP_IP_ADDRESS:-0.0.0.0}

x-api-service: &api-service
  image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-stack-api:${BILLING_STACK_API_IMAGE_TAG:-1.0.38}
  restart: unless-stopped
  volumes:
    - billing-stack-data:/storage
    - media-data:/storage/media
  networks:
    - codexsun-network

x-web-service: &web-service
  image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-stack-web:${BILLING_STACK_WEB_IMAGE_TAG:-1.0.38}
  restart: unless-stopped
  networks:
    - codexsun-network

services:
  storage-init:
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-stack-api:${BILLING_STACK_API_IMAGE_TAG:-1.0.38}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /storage/app /storage/public /storage/tenants /storage/backups/database
        chown -R 1000:1000 /storage/app /storage/public /storage/tenants /storage/backups
    volumes:
      - billing-stack-data:/storage
      - media-data:/storage/media
    networks:
      - codexsun-network
    healthcheck:
      disable: true
    restart: "no"

  platform-api:
    <<: *api-service
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.api
      target: runtime
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.38}
    container_name: codexsun-platform-api
    depends_on:
      storage-init:
        condition: service_completed_successfully
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: platform-api
      HEALTH_PORT: 7010
      PLATFORM_API_PORT: 7010
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${PLATFORM_API_HOST_PORT:-7010}:7010"

  platform-web:
    <<: *web-service
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.38}
        VITE_PLATFORM_API_URL: ${VITE_PLATFORM_API_URL:-http://localhost:7010}
        VITE_CORE_API_URL: ${VITE_CORE_API_URL:-http://localhost:7030}
        VITE_BILLING_API_URL: ${VITE_BILLING_API_URL:-http://localhost:7050}
        VITE_TENANT_NAME: ${VITE_TENANT_NAME:-Codexsun}
    container_name: codexsun-platform-web
    environment:
      CODEXSUN_WEB_APP: platform
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${PLATFORM_WEB_HOST_PORT:-7020}:80"

  core-api:
    <<: *api-service
    container_name: codexsun-core-api
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: core-api
      HEALTH_PORT: 7030
      CORE_API_PORT: 7030
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${CORE_API_HOST_PORT:-7030}:7030"

  core-web:
    <<: *web-service
    container_name: codexsun-core-web
    environment:
      CODEXSUN_WEB_APP: core
    depends_on:
      core-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${CORE_WEB_HOST_PORT:-7040}:80"

  billing-api:
    <<: *api-service
    container_name: codexsun-billing-api
    environment:
      <<: *api-env
      CODEXSUN_RUNTIME: billing-api
      HEALTH_PORT: 7050
      BILLING_API_PORT: 7050
    depends_on:
      core-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${BILLING_API_HOST_PORT:-7050}:7050"

  billing-web:
    <<: *web-service
    container_name: codexsun-billing-web
    environment:
      CODEXSUN_WEB_APP: billing
    depends_on:
      billing-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${BILLING_WEB_HOST_PORT:-7060}:80"

  platform-migrate:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.api
      target: migrations
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.38}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-stack-migrations:${BILLING_STACK_MIGRATIONS_IMAGE_TAG:-1.0.38}
    profiles:
      - tools
    environment:
      <<: *api-env
      PLATFORM_API_PORT: 7010
      CORE_API_PORT: 7030
      BILLING_API_PORT: 7050
    volumes:
      - billing-stack-data:/storage
      - media-data:/storage/media
    networks:
      - codexsun-network

volumes:
  billing-stack-data:
    name: ${BILLING_STACK_DATA_VOLUME:-codexsun-billing-stack-data}
  media-data:
    name: ${MEDIA_DATA_VOLUME:-codexsun-media-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
