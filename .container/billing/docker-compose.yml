services:
  billing-api:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.api
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-api:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-billing-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BILLING_API_HOST: 0.0.0.0
      BILLING_API_PORT: 7050
      BILLING_WEB_ORIGIN: ${BILLING_WEB_ORIGIN:-http://localhost:7060}
      PLATFORM_WEB_ORIGIN: ${PLATFORM_WEB_ORIGIN:-http://localhost:7020}
      CORE_API_URL: ${CORE_API_URL:-http://codexsun-core-api:7030}
      DB_HOST: ${DB_HOST:-codexsun-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-codexsun}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_MASTER_NAME: ${DB_MASTER_NAME:-codexsun_master}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GSP_ENVIRONMENT: ${GSP_ENVIRONMENT:-sandbox}
      GSP_EMAIL: ${GSP_EMAIL:-}
      GSP_USERNAME: ${GSP_USERNAME:-}
      GSP_PASSWORD: ${GSP_PASSWORD:-}
      GSP_CLIENT_ID: ${GSP_CLIENT_ID:-}
      GSP_CLIENT_SECRET: ${GSP_CLIENT_SECRET:-}
      GSP_GSTIN: ${GSP_GSTIN:-}
      GSP_IP_ADDRESS: ${GSP_IP_ADDRESS:-0.0.0.0}
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${BILLING_API_HOST_PORT:-7050}:7050"
    volumes:
      - billing-data:/storage
      - pictures-data:/storage/pictures
      - files-data:/storage/files
    networks:
      - codexsun-network

  billing-web:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
        VITE_BILLING_API_URL: ${VITE_BILLING_API_URL:-http://localhost:7050}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/billing-web:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-billing-web
    restart: unless-stopped
    depends_on:
      billing-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${BILLING_WEB_HOST_PORT:-7060}:80"
    networks:
      - codexsun-network

volumes:
  billing-data:
    name: ${BILLING_DATA_VOLUME:-codexsun-billing-data}
  pictures-data:
    name: ${PICTURES_DATA_VOLUME:-codexsun-pictures-data}
    external: true
  files-data:
    name: ${FILES_DATA_VOLUME:-codexsun-files-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
