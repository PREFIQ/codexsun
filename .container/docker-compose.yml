name: codexsun

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  DB_DRIVER: ${DB_DRIVER:-mariadb}
  DB_HOST: ${DB_HOST:-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-codexsun}
  DB_PASSWORD: ${DB_PASSWORD:-codexsun_change_me}
  DB_MASTER_NAME: ${DB_MASTER_NAME:-codexsun_master}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .container/deploy.env}
  AUTH_MODE: ${AUTH_MODE:-jwt}
  CODEXSUN_QUEUE_BACKEND: ${CODEXSUN_QUEUE_BACKEND:-bullmq}
  CODEXSUN_REDIS_URL: ${CODEXSUN_REDIS_URL:-redis://redis:6379}
  CODEXSUN_QUEUE_WORKER_ENABLED: ${CODEXSUN_QUEUE_WORKER_ENABLED:-1}
  CODEXSUN_QUEUE_WORKER_INTERVAL_MS: ${CODEXSUN_QUEUE_WORKER_INTERVAL_MS:-5000}
  CODEXSUN_BACKUP_DIR: ${CODEXSUN_BACKUP_DIR:-/storage/backups/database}
  STORAGE_ROOT: ${STORAGE_ROOT:-/storage/app}
  STORAGE_PUBLIC_ROOT: ${STORAGE_PUBLIC_ROOT:-/storage/public}
  CODEXSUN_DB_FRESH_ON_START: ${CODEXSUN_DB_FRESH_ON_START:-0}
  CODEXSUN_DB_RESET_CONFIRM: ${CODEXSUN_DB_RESET_CONFIRM:-}
  CODEXSUN_ALLOW_PRODUCTION_DB_RESET: ${CODEXSUN_ALLOW_PRODUCTION_DB_RESET:-0}
  ENABLE_DEFAULT_TENANT_SEED: ${ENABLE_DEFAULT_TENANT_SEED:-0}
  TENANT_DOMAIN_BASE: ${TENANT_DOMAIN_BASE:-localhost}
  DEFAULT_TENANT_NAME: ${DEFAULT_TENANT_NAME:-}
  DEFAULT_TENANT_CORPORATE_ID: ${DEFAULT_TENANT_CORPORATE_ID:-}
  DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-}
  DEFAULT_TENANT_DB_NAME: ${DEFAULT_TENANT_DB_NAME:-}
  DEFAULT_TENANT_DOMAIN: ${DEFAULT_TENANT_DOMAIN:-localhost}
  DEFAULT_TENANT_ADMIN_NAME: ${DEFAULT_TENANT_ADMIN_NAME:-}
  DEFAULT_TENANT_ADMIN_EMAIL: ${DEFAULT_TENANT_ADMIN_EMAIL:-}
  DEFAULT_TENANT_ADMIN_PASSWORD: ${DEFAULT_TENANT_ADMIN_PASSWORD:-}
  SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
  SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
  SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
  SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
  SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
  SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}
  PLATFORM_API_HOST: 0.0.0.0
  CORE_API_HOST: 0.0.0.0
  BILLING_API_HOST: 0.0.0.0
  PLATFORM_API_PORT: ${PLATFORM_API_PORT:-7010}
  PLATFORM_WEB_PORT: ${PLATFORM_WEB_PORT:-7020}
  CORE_API_PORT: ${CORE_API_PORT:-7030}
  CORE_WEB_PORT: ${CORE_WEB_PORT:-7040}
  BILLING_API_PORT: ${BILLING_API_PORT:-7050}
  BILLING_WEB_PORT: ${BILLING_WEB_PORT:-7060}
  PLATFORM_WEB_ORIGIN: ${PLATFORM_WEB_ORIGIN:-http://localhost:7020}
  CORE_WEB_ORIGIN: ${CORE_WEB_ORIGIN:-http://localhost:7040}
  BILLING_WEB_ORIGIN: ${BILLING_WEB_ORIGIN:-http://localhost:7060}
  VITE_PLATFORM_API_URL: ${VITE_PLATFORM_API_URL:-http://localhost:7010}
  VITE_CORE_API_URL: ${VITE_CORE_API_URL:-http://localhost:7030}
  VITE_BILLING_API_URL: ${VITE_BILLING_API_URL:-http://localhost:7050}
  VITE_TENANT_NAME: ${VITE_TENANT_NAME:-Codexsun}

x-app-service: &app-service
  build:
    context: ..
    dockerfile: .container/Dockerfile
  image: ${CODEXSUN_IMAGE:-codexsun:local}
  restart: unless-stopped
  env_file:
    - deploy.env
  environment:
    <<: *app-env
  volumes:
    - codexsun-storage:/storage
  networks:
    - codexsun-network

services:
  platform-api:
    <<: *app-service
    container_name: codexsun-platform-api
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: platform-api
    ports:
      - "${PLATFORM_API_HOST_PORT:-7010}:${PLATFORM_API_PORT:-7010}"

  platform-web:
    <<: *app-service
    container_name: codexsun-platform-web
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: platform-web
    ports:
      - "${PLATFORM_WEB_HOST_PORT:-7020}:${PLATFORM_WEB_PORT:-7020}"

  core-api:
    <<: *app-service
    container_name: codexsun-core-api
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: core-api
    ports:
      - "${CORE_API_HOST_PORT:-7030}:${CORE_API_PORT:-7030}"

  core-web:
    <<: *app-service
    container_name: codexsun-core-web
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: core-web
    ports:
      - "${CORE_WEB_HOST_PORT:-7040}:${CORE_WEB_PORT:-7040}"

  billing-api:
    <<: *app-service
    container_name: codexsun-billing-api
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: billing-api
    ports:
      - "${BILLING_API_HOST_PORT:-7050}:${BILLING_API_PORT:-7050}"

  billing-web:
    <<: *app-service
    container_name: codexsun-billing-web
    environment:
      <<: *app-env
      CODEXSUN_SERVICE: billing-web
    ports:
      - "${BILLING_WEB_HOST_PORT:-7060}:${BILLING_WEB_PORT:-7060}"

  files:
    image: filebrowser/filebrowser:v2.63.5
    container_name: codexsun-files
    restart: unless-stopped
    user: "0:0"
    command:
      - --address
      - 0.0.0.0
      - --port
      - "80"
      - --root
      - /srv
      - --database
      - /database/filebrowser.db
      - --username
      - ${FILE_SERVER_USER:-admin}
      - --password
      - ${FILE_SERVER_PASSWORD:-change-me-now}
    ports:
      - "${FILE_SERVER_HOST_PORT:-7090}:80"
    volumes:
      - codexsun-storage:/srv
      - codexsun-files-db:/database
    networks:
      - codexsun-network

  docker-admin:
    image: portainer/portainer-ce:2.33.1-alpine
    container_name: codexsun-docker-admin
    restart: unless-stopped
    profiles:
      - admin
    ports:
      - "${DOCKER_ADMIN_HOST_PORT:-7091}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - codexsun-portainer:/data
    networks:
      - codexsun-network

  mariadb-admin:
    image: adminer:5.3.0
    container_name: codexsun-mariadb-admin
    restart: unless-stopped
    profiles:
      - admin
    ports:
      - "${MARIADB_ADMIN_HOST_PORT:-7092}:8080"
    networks:
      - codexsun-network

  redis-admin:
    image: rediscommander/redis-commander:latest
    container_name: codexsun-redis-admin
    restart: unless-stopped
    profiles:
      - admin
    environment:
      REDIS_HOSTS: ${REDIS_ADMIN_HOSTS:-local:redis:6379}
    ports:
      - "${REDIS_ADMIN_HOST_PORT:-7093}:8081"
    networks:
      - codexsun-network

  mariadb:
    image: mariadb:11.8
    container_name: codexsun-mariadb
    restart: unless-stopped
    profiles:
      - internal-db
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_change_me}
      MARIADB_DATABASE: ${DB_MASTER_NAME:-codexsun_master}
      MARIADB_USER: ${DB_USER:-codexsun}
      MARIADB_PASSWORD: ${DB_PASSWORD:-codexsun_change_me}
    ports:
      - "${MARIADB_HOST_PORT:-3306}:3306"
    volumes:
      - codexsun-mariadb:/var/lib/mysql
    networks:
      - codexsun-network

  redis:
    image: redis:7.4-alpine
    container_name: codexsun-redis
    restart: unless-stopped
    profiles:
      - internal-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - codexsun-redis:/data
    networks:
      - codexsun-network

volumes:
  codexsun-storage:
    name: ${CODEXSUN_STORAGE_VOLUME:-codexsun-storage}
  codexsun-files-db:
    name: ${CODEXSUN_FILES_DB_VOLUME:-codexsun-files-db}
  codexsun-mariadb:
    name: ${CODEXSUN_MARIADB_VOLUME:-codexsun-mariadb}
  codexsun-redis:
    name: ${CODEXSUN_REDIS_VOLUME:-codexsun-redis}
  codexsun-portainer:
    name: ${CODEXSUN_PORTAINER_VOLUME:-codexsun-portainer}

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
