name: codexsun

# Full deployment aggregator. Every included stack can also be deployed alone
# with its own Compose file and the same deployment environment file.
include:
  - path: database/mariadb/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: database/redis/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: storage/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: platform/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: core/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: billing/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
  - path: kitchen-serve/docker-compose.yml
    env_file: ${CODEXSUN_ENV_FILE:-deploy.env}
