name: codexsun-mariadb

services:
  mariadb:
    build:
      context: ../../..
      dockerfile: .container/database/mariadb/Dockerfile
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.33}
        MARIADB_BASE_IMAGE: ${MARIADB_BASE_IMAGE:-mariadb:11.8}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/mariadb:${MARIADB_IMAGE_TAG:-11.8-codexsun-1.0.33}
    container_name: codexsun-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${DB_MASTER_NAME:-codexsun_master}
      MARIADB_USER: ${DB_USER:-codexsun}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${MARIADB_HOST_PORT:-3306}:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - mariadb-backups:/backups
    networks:
      - codexsun-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 12

volumes:
  mariadb-data:
    name: ${MARIADB_DATA_VOLUME:-codexsun-mariadb-data}
  mariadb-backups:
    name: ${MARIADB_BACKUP_VOLUME:-codexsun-mariadb-backups}

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
