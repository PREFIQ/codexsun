name: codexsun-redis

services:
  redis:
    build:
      context: ../../..
      dockerfile: .container/database/redis/Dockerfile
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.38}
        REDIS_BASE_IMAGE: ${REDIS_BASE_IMAGE:-redis:7.4-alpine}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/redis:${REDIS_IMAGE_TAG:-7.4-codexsun-1.0.38}
    container_name: codexsun-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -ec
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    ports:
      - "${CODEXSUN_BIND_ADDRESS:?CODEXSUN_BIND_ADDRESS is required}:${REDIS_HOST_PORT:?REDIS_HOST_PORT is required}:6379"
    volumes:
      - redis-data:/data
    networks:
      - codexsun-network
    healthcheck:
      test:
        - CMD-SHELL
        - if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping; else redis-cli ping; fi
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 12

volumes:
  redis-data:
    name: ${REDIS_DATA_VOLUME:-codexsun-redis-data}

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
