x-platform-env: &platform-env
  NODE_ENV: production
  AUTH_MODE: ${AUTH_MODE:-jwt}
  PLATFORM_API_HOST: 0.0.0.0
  PLATFORM_API_PORT: 7010
  PLATFORM_WEB_ORIGIN: ${PLATFORM_WEB_ORIGIN:-http://localhost:7020}
  CORE_WEB_ORIGIN: ${CORE_WEB_ORIGIN:-http://localhost:7040}
  BILLING_WEB_ORIGIN: ${BILLING_WEB_ORIGIN:-http://localhost:7060}
  KITCHEN_SERVE_WEB_ORIGIN: ${KITCHEN_SERVE_WEB_ORIGIN:-http://localhost:7120}
  CORE_API_PORT: 7030
  BILLING_API_PORT: 7050
  KITCHEN_SERVE_API_PORT: 7110
  PLATFORM_API_URL: ${PLATFORM_API_URL:-http://codexsun-platform-api:7010}
  CORE_API_URL: ${CORE_API_URL:-http://codexsun-core-api:7030}
  DB_DRIVER: mariadb
  DB_HOST: ${DB_HOST:-codexsun-mariadb}
  DB_PORT: ${DB_PORT:-3306}
  DB_USER: ${DB_USER:-codexsun}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_MASTER_NAME: ${DB_MASTER_NAME:-codexsun_master}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  CODEXSUN_QUEUE_BACKEND: ${CODEXSUN_QUEUE_BACKEND:-bullmq-redis}
  CODEXSUN_REDIS_URL: ${CODEXSUN_REDIS_URL:-redis://codexsun-redis:6379}
  CODEXSUN_QUEUE_WORKER_ENABLED: ${CODEXSUN_QUEUE_WORKER_ENABLED:-1}
  CODEXSUN_DB_FRESH_ON_START: ${CODEXSUN_DB_FRESH_ON_START:-0}
  CODEXSUN_ALLOW_PRODUCTION_DB_RESET: ${CODEXSUN_ALLOW_PRODUCTION_DB_RESET:-0}
  CODEXSUN_BACKUP_DIR: /storage/backups/database
  STORAGE_ROOT: /storage/app
  STORAGE_PUBLIC_ROOT: /storage/public
  ENABLE_DEFAULT_TENANT_SEED: ${ENABLE_DEFAULT_TENANT_SEED:-0}
  TENANT_DOMAIN_BASE: ${TENANT_DOMAIN_BASE:-localhost}

services:
  platform-api:
    build:
      context: ../..
      dockerfile: .container/platform/Dockerfile.api
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/platform-api:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-platform-api
    restart: unless-stopped
    environment:
      <<: *platform-env
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${PLATFORM_API_HOST_PORT:-7010}:7010"
    volumes:
      - platform-data:/storage
      - pictures-data:/storage/pictures
      - files-data:/storage/files
    networks:
      - codexsun-network

  platform-migrate:
    build:
      context: ../..
      dockerfile: .container/platform/Dockerfile.api
      target: migrations
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/platform-migrations:${CODEXSUN_VERSION:-1.0.32}
    profiles:
      - tools
    environment:
      <<: *platform-env
    volumes:
      - platform-data:/storage
      - pictures-data:/storage/pictures
      - files-data:/storage/files
    networks:
      - codexsun-network

  platform-web:
    build:
      context: ../..
      dockerfile: .container/platform/Dockerfile.web
      args:
        CODEXSUN_VERSION: ${CODEXSUN_VERSION:-1.0.32}
        VITE_PLATFORM_API_URL: ${VITE_PLATFORM_API_URL:-http://localhost:7010}
        VITE_TENANT_NAME: ${VITE_TENANT_NAME:-Codexsun}
    image: ${CODEXSUN_IMAGE_REGISTRY:-codexsun}/platform-web:${CODEXSUN_VERSION:-1.0.32}
    container_name: codexsun-platform-web
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "${CODEXSUN_BIND_ADDRESS:-127.0.0.1}:${PLATFORM_WEB_HOST_PORT:-7020}:80"
    networks:
      - codexsun-network

volumes:
  platform-data:
    name: ${PLATFORM_DATA_VOLUME:-codexsun-platform-data}
  pictures-data:
    name: ${PICTURES_DATA_VOLUME:-codexsun-pictures-data}
    external: true
  files-data:
    name: ${FILES_DATA_VOLUME:-codexsun-files-data}
    external: true

networks:
  codexsun-network:
    name: ${CODEXSUN_DOCKER_NETWORK:-codexsun-network}
    external: true
