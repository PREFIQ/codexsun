# The default host is the Platform tenant workspace. Public marketing domains
# above are exact matches, while tenant domains are resolved by Platform.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name app.codexsun.com _;

    root /var/www/codexsun-platform;
    index index.html;
    client_max_body_size 25m;

    location = /api/platform {
        return 308 /api/platform/;
    }

    location /api/platform/ {
        proxy_pass http://127.0.0.1:7010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
