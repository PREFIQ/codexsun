server {
    listen 80;
    listen [::]:80;
    server_name codexsun.com www.codexsun.com;

    root /var/www/sites/codexsun;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

